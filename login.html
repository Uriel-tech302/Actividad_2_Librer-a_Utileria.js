<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Login de Acceso</h1>
    
    <form id="loginForm">
        <div>
            <label for="loginCorreo">Correo Electrónico:</label>
            <input type="text" id="loginCorreo" required>
            <span id="errorLoginCorreo" style="color: red; display: none;"><br>Formato de correo inválido.</span>
        </div>
        <br>
        <div>
            <label for="loginPassword">Contraseña:</label>
            <input type="password" id="loginPassword" required>
            <span id="errorLoginPassword" style="color: red; display: none;"><br>La contraseña debe tener mínimo 8 caracteres, incluir una mayúscula, una minúscula, un número y un carácter especial.</span>
        </div>
        <br>
        <button type="submit">Ingresar</button>
    </form>

    <p id="mensajeLogin" style="font-weight: bold; margin-top: 15px;"></p>

    <!-- Conectamos tu librería JS -->
    <script src="js/utileria.js"></script>
    
    <!-- Lógica del Login -->
    <script>
        const formLogin = document.getElementById('loginForm');
        const mensajeLogin = document.getElementById('mensajeLogin');

        formLogin.addEventListener('submit', function(event) {
            event.preventDefault(); // Evita recargar la página

            const correo = document.getElementById('loginCorreo').value;
            const password = document.getElementById('loginPassword').value;
            
            let esValido = true;

            // Usamos validarCorreo de tu librería
            if (!validarCorreo(correo)) {
                document.getElementById('errorLoginCorreo').style.display = 'block';
                esValido = false;
            } else {
                document.getElementById('errorLoginCorreo').style.display = 'none';
            }

            // Usamos validarPassword de tu librería
            if (!validarPassword(password)) {
                document.getElementById('errorLoginPassword').style.display = 'block';
                esValido = false;
            } else {
                document.getElementById('errorLoginPassword').style.display = 'none';
            }

            // Resultado final
            if (esValido) {
                mensajeLogin.style.color = "green";
                mensajeLogin.textContent = "¡Credenciales válidas! Iniciando sesión...";
                formLogin.reset();
            } else {
                mensajeLogin.textContent = "";
            }
        });
    </script>
</body>
</html>
